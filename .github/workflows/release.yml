name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (required when running manually)'
        required: false
        type: string
      release_name:
        description: 'Release title (defaults to the tag name)'
        required: false
        type: string
      draft:
        description: 'Create the release as a draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Github-Trend.sln

      - name: Publish
        id: publish
        continue-on-error: true
        run: dotnet publish Github-Trend.sln -c Release --no-restore -o ./artifacts/${{ matrix.platform }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GithubTrend-${{ matrix.platform }}
          path: ./artifacts/${{ matrix.platform }}
          if-no-files-found: ignore

      - name: Report publish result
        if: always()
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Publish outcome: ${{ steps.publish.outcome }}"
          echo "This workflow is intentionally non-blocking so it can surface issues before shipping a release."

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event_name == 'push' && github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            echo "Missing tag name. Provide 'tag_name' when running the workflow manually." >&2
            exit 1
          fi

          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$TAG_NAME"
          fi

          DRAFT="${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Download published artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: GithubTrend-*
          path: ./release-assets
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
          files: |
            release-assets/**
          fail_on_unmatched_files: false

      - name: Report release result
        if: always()
        run: |
          echo "Release tag: ${{ steps.meta.outputs.tag_name }}"
          echo "Release name: ${{ steps.meta.outputs.release_name }}"
          echo "Release creation is intentionally non-blocking for pre-release validation purposes."


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Release workflow — .NET / Avalonia                                         ║
# ║                                                                              ║
# ║  Produces, per RID, exactly 5 format × 2 modes (SCD + FDD) = 10 files :    ║
# ║    Windows  →  .exe   (SCD = single-file  |  FDD = SFX self-extracting)    ║
# ║    macOS    →  .dmg   (UDZO zlib-9)                                         ║
# ║    Linux    →  naked binary  +  .deb  +  .rpm                               ║
# ║                                                                              ║
# ║  Size-reduction stack :                                                      ║
# ║    • PublishSingleFile + EnableCompressionInSingleFile  (SCD)               ║
# ║    • PublishTrimmed=false  (Avalonia uses reflection — trim crashes app)    ║
# ║    • PublishReadyToRun=false                                                 ║
# ║    • No debug symbols / PDBs                                                 ║
# ║    • UPX --best --lzma  (Windows SCD .exe + Linux naked binary)             ║
# ║    • strip --strip-all  (Linux / macOS — via portable [ -x ] test)          ║
# ║    • 7-Zip LZMA2 mx=9  (Windows FDD SFX)                                    ║
# ║    • hdiutil UDZO zlib-9  (macOS DMG)                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.2.3)  — required for manual runs'
        required: true
        type: string
      release_name:
        description: 'Release title  (defaults to tag name)'
        required: false
        type: string
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# ── Globals ──────────────────────────────────────────────────────────────────
env:
  PROJECT:        Github-Trend.csproj   # ← adjust if your .csproj has another name
  APP_NAME:       github-trend
  DOTNET_VERSION: '10.0.x'

# ═════════════════════════════════════════════════════════════════════════════
#  JOB: build
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true            # one broken RID must not abort the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, platform: windows, rid: win-x64    }
          - { os: windows-latest, platform: windows, rid: win-arm64  }
          - { os: macos-latest,   platform: macos,   rid: osx-x64    }
          - { os: macos-latest,   platform: macos,   rid: osx-arm64  }
          - { os: ubuntu-latest,  platform: linux,   rid: linux-x64  }
          - { os: ubuntu-latest,  platform: linux,   rid: linux-arm64 }

    steps:
      # ── Checkout + .NET ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Resolve tag name ───────────────────────────────────────────────────
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Restore ────────────────────────────────────────────────────────────
      - name: Restore
        shell: bash
        run: |
          dotnet restore "${{ env.PROJECT }}" --runtime "${{ matrix.rid }}" || true

      # ── SCD publish ────────────────────────────────────────────────────────
      # Trimming (TrimMode=link/full) is intentionally DISABLED for Avalonia:
      # Avalonia relies on reflection for XAML, styles and converters — the IL
      # linker silently removes those and produces a binary that crashes at
      # startup while appearing to compile fine. Size reduction comes from
      # EnableCompressionInSingleFile + no debug info + UPX at packaging time.
      - name: Publish SCD
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:EnableCompressionInSingleFile=true \
            -p:PublishReadyToRun=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:StripSymbols=true \
            -o "out/scd/${{ matrix.rid }}" \
            --no-restore || true

      # ── FDD publish ────────────────────────────────────────────────────────
      # Smaller download when the user already has the .NET runtime installed.
      - name: Publish FDD
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained false \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "out/fdd/${{ matrix.rid }}" \
            --no-restore || true

      # ════════════════════════════════════════════════════════════════════════
      #  WINDOWS PACKAGING
      #  SCD → single .exe compressed with UPX
      #  FDD → self-extracting .exe via 7-Zip SFX (7-Zip pre-installed on runner)
      # ════════════════════════════════════════════════════════════════════════

      # UPX is not pre-installed on windows-latest; grab the latest release binary.
      - name: Windows · Install UPX
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod "https://api.github.com/repos/upx/upx/releases/latest"
          $asset = $rel.assets | Where-Object { $_.name -match "win64\.zip$" } | Select-Object -First 1
          if (-not $asset) { Write-Warning "UPX asset not found — skipping"; exit 0 }
          $zip = "$env:TEMP\upx.zip"
          Invoke-WebRequest $asset.browser_download_url -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:TEMP\upx_extract" -Force
          $upxExe = Get-ChildItem "$env:TEMP\upx_extract" -Recurse -Filter "upx.exe" | Select-Object -First 1
          Copy-Item $upxExe.FullName "C:\Windows\System32\upx.exe"
          Write-Host "UPX installed: $(upx --version | Select-Object -First 1)"

      - name: Package · Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          $app = $env:APP_NAME
          $tag = $env:TAG
          $rid = "${{ matrix.rid }}"
          $pkg = "packages/$rid"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          # ── SCD : compress the single .exe with UPX, then copy ──────────────
          $scdDir = "out/scd/$rid"
          $scdExe = Get-ChildItem $scdDir -Filter "*.exe" -File | Select-Object -First 1
          if ($scdExe) {
            $dst = "$pkg/$app-$tag-$rid-scd.exe"
            Copy-Item $scdExe.FullName $dst
            # UPX: LZMA best compression (~40 % size reduction on PE binaries)
            # arm64 PE support landed in UPX 4.x — gracefully skip if it fails
            upx --best --lzma $dst 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "UPX failed or unsupported for $rid — keeping uncompressed"
              Copy-Item $scdExe.FullName $dst -Force
            }
            Write-Host "SCD → $dst  ($('{0:N1} MB' -f ((Get-Item $dst).Length/1MB)))"
          } else {
            Write-Warning "SCD: no .exe found in $scdDir"
          }

          # ── FDD : self-extracting .exe via 7-Zip SFX ────────────────────────
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $sfxMod   = "C:\Program Files\7-Zip\7z.sfx"

          if (-not (Test-Path $sfxMod)) {
            Write-Warning "7-Zip SFX module not found at $sfxMod — FDD packaging skipped"
          } else {
            $fddDir  = (Resolve-Path "out/fdd/$rid").Path
            $mainExe = (Get-ChildItem $fddDir -Filter "*.exe" -File | Select-Object -First 1).Name

            # 7-Zip LZMA2 ultra-compression archive
            $arcTmp = [System.IO.Path]::GetTempFileName() + ".7z"
            & $sevenZip a -t7z -mx=9 -mmt=on -m0=lzma2 -md=128m -mfb=64 `
                "$arcTmp" "$fddDir\*" | Out-Null

            # SFX config: silent extract + launch the apphost
            $cfgTmp = [System.IO.Path]::GetTempFileName()
            $config = @(
              ';!@InstallStart@!'
              "Title=`"$app $tag ($rid) - FDD`""
              "RunProgram=`"$mainExe`""
              'GUIFlags="8"'
              ';!@InstallEnd@!'
            ) -join "`r`n"
            Set-Content -Path $cfgTmp -Value $config -Encoding UTF8

            # Binary concatenation: sfx_stub + config + archive = single SFX .exe
            $outSfx = "$pkg/$app-$tag-$rid-fdd.exe"
            $bytes = New-Object System.Collections.Generic.List[byte]
            foreach ($f in @($sfxMod, $cfgTmp, $arcTmp)) {
              $bytes.AddRange([System.IO.File]::ReadAllBytes($f))
            }
            [System.IO.File]::WriteAllBytes($outSfx, $bytes.ToArray())

            Remove-Item $arcTmp, $cfgTmp -Force -ErrorAction SilentlyContinue
            Write-Host "FDD SFX → $outSfx  ($('{0:N1} MB' -f ((Get-Item $outSfx).Length/1MB)))"
          }

      # ════════════════════════════════════════════════════════════════════════
      #  MACOS PACKAGING
      #  Both SCD and FDD → .dmg  (UDRW staging → UDZO zlib-9 final)
      # ════════════════════════════════════════════════════════════════════════
      - name: Package · macOS
        if: matrix.platform == 'macos'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          APP="${{ env.APP_NAME }}"
          RID="${{ matrix.rid }}"
          PKG="packages/$RID"
          mkdir -p "$PKG"

          strip_dir() {
            while IFS= read -r -d '' f; do
              [ -x "$f" ] && strip "$f" 2>/dev/null || true
            done < <(find "$1" -maxdepth 3 -type f -print0)
          }

          find_exec() {
            while IFS= read -r -d '' f; do
              [ -x "$f" ] && echo "$f" && return
            done < <(find "$1" -maxdepth 1 -type f -print0)
          }

          make_dmg() {
            local TYPE="$1"
            local SRC="$2"
            [ ! -d "$SRC" ] && echo "[$TYPE] $SRC not found - skip" && return

            local MAINBIN
            MAINBIN=$(find_exec "$SRC")
            [ -n "$MAINBIN" ] && strip "$MAINBIN" 2>/dev/null || true
            strip_dir "$SRC"

            local TMP_UDRW OUT
            TMP_UDRW=$(mktemp).dmg
            OUT="$PKG/${APP}-${TAG}-${RID}-${TYPE}.dmg"

            hdiutil create \
              -volname "${APP}" \
              -srcfolder "$SRC" \
              -ov -format UDRW \
              "$TMP_UDRW" >/dev/null

            hdiutil convert "$TMP_UDRW" \
              -format UDZO \
              -imagekey zlib-level=9 \
              -o "$OUT" >/dev/null

            rm -f "$TMP_UDRW"
            echo "[$TYPE] DMG → $OUT  ($(du -sh "$OUT" | cut -f1))"
          }

          make_dmg "scd" "out/scd/$RID"
          make_dmg "fdd" "out/fdd/$RID"

      # ════════════════════════════════════════════════════════════════════════
      #  LINUX PACKAGING
      #  Per mode (SCD + FDD) → naked binary  +  .deb  +  .rpm
      # ════════════════════════════════════════════════════════════════════════
      - name: Linux · Install packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            upx-ucl \
            binutils \
            ruby ruby-dev \
            build-essential \
            rpm dpkg-dev fakeroot \
            patchelf
          sudo gem install --no-document fpm

      - name: Package · Linux
        if: matrix.platform == 'linux'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          APP="${{ env.APP_NAME }}"
          RID="${{ matrix.rid }}"
          PKG="packages/$RID"
          mkdir -p "$PKG"

          RPM_VER=$(echo "${TAG#v}" | tr '-' '.')

          case "$RID" in
            linux-x64)    DEB_ARCH=amd64   ; RPM_ARCH=x86_64   ;;
            linux-arm64)  DEB_ARCH=arm64   ; RPM_ARCH=aarch64  ;;
            linux-arm)    DEB_ARCH=armhf   ; RPM_ARCH=armv7hl  ;;
            *)            DEB_ARCH=amd64   ; RPM_ARCH=x86_64   ;;
          esac

          package_linux() {
            local TYPE="$1"
            local SRC="$2"

            local BIN
            BIN=$(find "$SRC" -maxdepth 1 -type f -executable | head -n1 || true)
            if [ -z "$BIN" ]; then
              echo "[$TYPE] No executable found in $SRC - skipping"
              return
            fi

            local NAKED="$PKG/${APP}-${TAG}-${RID}-${TYPE}"

            if [ "$TYPE" = "scd" ]; then
              cp "$BIN" "$NAKED"
              chmod +x "$NAKED"
              strip --strip-all "$NAKED" 2>/dev/null || true
              upx --best --lzma "$NAKED" 2>/dev/null \
                || upx --best "$NAKED" 2>/dev/null \
                || echo "[$TYPE] upx skipped"
            else
              find "$SRC" -maxdepth 2 -type f | while read -r f; do
                strip "$f" 2>/dev/null || true
              done

              local APPHOST_NAME
              APPHOST_NAME=$(basename "$BIN")
              local PAYLOAD
              PAYLOAD=$(mktemp)
              tar -C "$SRC" -czf "$PAYLOAD" .

              printf '%s\n' '#!/bin/sh' > "$NAKED"
              printf '%s\n' '# Self-extracting FDD launcher' >> "$NAKED"
              printf '%s\n' 'set -e' >> "$NAKED"
              printf 'D="${XDG_DATA_HOME:-$HOME/.local/share}/%s"\n' "$APP" >> "$NAKED"
              printf 'V="%s"\n' "$TAG" >> "$NAKED"
              printf '%s\n' '[ -f "$D/.sfx-$V" ] || {' >> "$NAKED"
              printf '  printf "Installing %s %s...\\n" "%s" "$V" >&2\n' "$APP" "$APP" >> "$NAKED"
              printf '%s\n' '  rm -rf "$D" && mkdir -p "$D"' >> "$NAKED"
              printf '%s\n' '  L=$(grep -an "^__P__$" "$0" | cut -d: -f1 | tail -1)' >> "$NAKED"
              printf '%s\n' '  tail -n +"$((L+1))" "$0" | tar -xzf - -C "$D"' >> "$NAKED"
              printf '%s\n' '  touch "$D/.sfx-$V"' >> "$NAKED"
              printf '%s\n' '}' >> "$NAKED"
              printf 'exec "$D/%s" "$@"\n' "$APPHOST_NAME" >> "$NAKED"
              printf '%s\n' '__P__' >> "$NAKED"
              cat "$PAYLOAD" >> "$NAKED"
              rm -f "$PAYLOAD"
              chmod +x "$NAKED"
            fi

            echo "[$TYPE] naked → $NAKED  ($(du -sh "$NAKED" | cut -f1))"

            local PKG_ROOT="$PKG/pkgroot-${TYPE}"
            local FPM_PATHS
            rm -rf "$PKG_ROOT"

            if [ "$TYPE" = "scd" ]; then
              mkdir -p "$PKG_ROOT/usr/local/bin"
              cp "$NAKED" "$PKG_ROOT/usr/local/bin/$APP"
              FPM_PATHS="usr/local/bin/$APP"
            else
              mkdir -p "$PKG_ROOT/usr/lib/$APP"
              mkdir -p "$PKG_ROOT/usr/local/bin"
              cp -r "$SRC"/. "$PKG_ROOT/usr/lib/$APP/"
              find "$PKG_ROOT/usr/lib/$APP" -maxdepth 2 -type f | while read -r f; do
                strip "$f" 2>/dev/null || true
              done

              local APPHOST_NAME
              APPHOST_NAME=$(basename "$BIN")
              printf '%s\n' '#!/bin/sh' > "$PKG_ROOT/usr/local/bin/$APP"
              printf 'exec "/usr/lib/%s/%s" "$@"\n' "$APP" "$APPHOST_NAME" >> "$PKG_ROOT/usr/local/bin/$APP"
              chmod +x "$PKG_ROOT/usr/local/bin/$APP"
              FPM_PATHS="usr/lib/$APP usr/local/bin/$APP"
            fi

            # shellcheck disable=SC2086
            fpm \
              -s dir -t deb \
              -n "$APP" \
              -v "${TAG#v}" \
              --architecture "$DEB_ARCH" \
              --description "Github Trend - ${TYPE} build" \
              --prefix / \
              -C "$PKG_ROOT" \
              -p "$PKG/${APP}-${TAG}-${RID}-${TYPE}.deb" \
              $FPM_PATHS \
            || echo "[$TYPE] fpm deb skipped"

            # shellcheck disable=SC2086
            fpm \
              -s dir -t rpm \
              -n "$APP" \
              -v "$RPM_VER" \
              --architecture "$RPM_ARCH" \
              --description "Github Trend - ${TYPE} build" \
              --prefix / \
              -C "$PKG_ROOT" \
              -p "$PKG/${APP}-${TAG}-${RID}-${TYPE}.rpm" \
              $FPM_PATHS \
            || echo "[$TYPE] fpm rpm skipped"

            rm -rf "$PKG_ROOT"
            echo "[$TYPE] packaging done"
          }

          package_linux "scd" "out/scd/$RID"
          package_linux "fdd" "out/fdd/$RID"

      - name: List packages/${{ matrix.rid }}
        shell: bash
        run: |
          echo "=== packages/${{ matrix.rid }} ==="
          find "packages/${{ matrix.rid }}" -maxdepth 1 -type f \
            -exec ls -lh {} \; 2>/dev/null || echo "(empty)"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.rid }}
          path: packages/${{ matrix.rid }}/
          if-no-files-found: warn

  # ═════════════════════════════════════════════════════════════════════════════
  #  JOB: release  — downloads all per-RID artifacts and creates the GH release
  # ═════════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::tag_name is required when running the workflow manually"
            exit 1
          fi

          NAME="${{ inputs.release_name }}"
          [ -z "$NAME" ] && NAME="$TAG"
          DRAFT="${{ inputs.draft || 'false' }}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./assets
          merge-multiple: true

      - name: List release assets
        run: find assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            assets/**/*.exe
            assets/**/*.dmg
            assets/**/*.deb
            assets/**/*.rpm
            assets/**/github-trend-*

      - name: Release summary
        if: always()
        run: |
          echo "tag  : ${{ steps.meta.outputs.tag }}"
          echo "name : ${{ steps.meta.outputs.name }}"
          echo "draft: ${{ steps.meta.outputs.draft }}"

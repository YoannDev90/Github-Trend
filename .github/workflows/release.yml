# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Release workflow — .NET / Avalonia                                         ║
# ║                                                                              ║
# ║  Produces, per RID, exactly 5 format × 2 modes (SCD + FDD) = 10 files :    ║
# ║    Windows  →  .exe   (SCD = single-file  |  FDD = SFX self-extracting)    ║
# ║    macOS    →  .dmg   (UDZO zlib-9)                                         ║
# ║    Linux    →  naked binary  +  .deb  +  .rpm                               ║
# ║                                                                              ║
# ║  Size-reduction stack :                                                      ║
# ║    • PublishSingleFile + EnableCompressionInSingleFile  (SCD)               ║
# ║    • PublishTrimmed / TrimMode=link  (SCD — safe for Avalonia¹)             ║
# ║    • PublishReadyToRun=false                                                 ║
# ║    • No debug symbols / PDBs                                                 ║
# ║    • strip --strip-all  (Linux / macOS)                                      ║
# ║    • UPX --best --lzma  (Linux naked binary + UPX fallback)                 ║
# ║    • 7-Zip LZMA2 mx=9  (Windows FDD SFX)                                    ║
# ║    • hdiutil UDZO zlib-9  (macOS DMG)                                        ║
# ║                                                                              ║
# ║  ¹ If trimming breaks your Avalonia app, set TrimMode to "partial" or add   ║
# ║    a TrimmerRootDescriptor file in your .csproj.                             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.2.3)  — required for manual runs'
        required: true
        type: string
      release_name:
        description: 'Release title  (defaults to tag name)'
        required: false
        type: string
      draft:
        description: 'Create as draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# ── Globals ──────────────────────────────────────────────────────────────────
env:
  PROJECT:        Github-Trend.csproj   # ← adjust if your .csproj has another name
  APP_NAME:       github-trend
  DOTNET_VERSION: '10.0.x'

# ═════════════════════════════════════════════════════════════════════════════
#  JOB: build
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true            # one broken RID must not abort the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, platform: windows, rid: win-x64    }
          - { os: windows-latest, platform: windows, rid: win-arm64  }
          - { os: macos-latest,   platform: macos,   rid: osx-x64    }
          - { os: macos-latest,   platform: macos,   rid: osx-arm64  }
          - { os: ubuntu-latest,  platform: linux,   rid: linux-x64  }
          - { os: ubuntu-latest,  platform: linux,   rid: linux-arm64 }

    steps:
      # ── Checkout + .NET ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Resolve tag name ───────────────────────────────────────────────────
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Restore ────────────────────────────────────────────────────────────
      - name: Restore
        shell: bash
        run: |
          dotnet restore "${{ env.PROJECT }}" --runtime "${{ matrix.rid }}" || true

      # ── SCD publish ────────────────────────────────────────────────────────
      # One single native binary, trimmed + compressed in the binary itself.
      - name: Publish SCD
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:TrimMode=link \
            -p:EnableCompressionInSingleFile=true \
            -p:PublishReadyToRun=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:StripSymbols=true \
            -o "out/scd/${{ matrix.rid }}" \
            --no-restore || true

      # ── FDD publish ────────────────────────────────────────────────────────
      # Smaller download when the user already has the .NET runtime installed.
      - name: Publish FDD
        shell: bash
        run: |
          dotnet publish "${{ env.PROJECT }}" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained false \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "out/fdd/${{ matrix.rid }}" \
            --no-restore || true

      # ════════════════════════════════════════════════════════════════════════
      #  WINDOWS PACKAGING
      #  SCD → single .exe (already a single file from PublishSingleFile)
      #  FDD → self-extracting .exe via 7-Zip SFX (7-Zip pre-installed on runner)
      # ════════════════════════════════════════════════════════════════════════
      - name: Package · Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          $app = $env:APP_NAME
          $tag = $env:TAG
          $rid = "${{ matrix.rid }}"
          $pkg = "packages/$rid"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          # ── SCD : copy the single .exe produced by PublishSingleFile ────────
          $scdDir = "out/scd/$rid"
          $scdExe = Get-ChildItem $scdDir -Filter "*.exe" -File | Select-Object -First 1
          if ($scdExe) {
            $dst = "$pkg/$app-$tag-$rid-scd.exe"
            Copy-Item $scdExe.FullName $dst
            Write-Host "SCD → $dst  ($('{0:N1} MB' -f ((Get-Item $dst).Length/1MB)))"
          } else {
            Write-Warning "SCD: no .exe found in $scdDir"
          }

          # ── FDD : self-extracting .exe via 7-Zip SFX ────────────────────────
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $sfxMod   = "C:\Program Files\7-Zip\7z.sfx"

          if (-not (Test-Path $sfxMod)) {
            Write-Warning "7-Zip SFX module not found at $sfxMod — FDD packaging skipped"
          } else {
            $fddDir  = (Resolve-Path "out/fdd/$rid").Path
            $mainExe = (Get-ChildItem $fddDir -Filter "*.exe" -File | Select-Object -First 1).Name

            # 7-Zip LZMA2 ultra-compression archive
            $arcTmp = [System.IO.Path]::GetTempFileName() + ".7z"
            & $sevenZip a -t7z -mx=9 -mmt=on -m0=lzma2 -md=128m -mfb=64 `
                "$arcTmp" "$fddDir\*" | Out-Null

            # SFX config: silent extract + launch the apphost
            $cfgTmp = [System.IO.Path]::GetTempFileName()
            $config = @(
              ';!@InstallStart@!'
              "Title=`"$app $tag ($rid) — FDD`""
              "RunProgram=`"$mainExe`""
              'GUIFlags="8"'
              ';!@InstallEnd@!'
            ) -join "`r`n"
            Set-Content -Path $cfgTmp -Value $config -Encoding UTF8

            # Binary concatenation: sfx_stub + config + archive = single SFX .exe
            $outSfx = "$pkg/$app-$tag-$rid-fdd.exe"
            $bytes = New-Object System.Collections.Generic.List[byte]
            foreach ($f in @($sfxMod, $cfgTmp, $arcTmp)) {
              $bytes.AddRange([System.IO.File]::ReadAllBytes($f))
            }
            [System.IO.File]::WriteAllBytes($outSfx, $bytes.ToArray())

            Remove-Item $arcTmp, $cfgTmp -Force -ErrorAction SilentlyContinue
            Write-Host "FDD SFX → $outSfx  ($('{0:N1} MB' -f ((Get-Item $outSfx).Length/1MB)))"
          }

      # ════════════════════════════════════════════════════════════════════════
      #  MACOS PACKAGING
      #  Both SCD and FDD → .dmg  (UDRW staging → UDZO zlib-9 final)
      # ════════════════════════════════════════════════════════════════════════
      - name: Package · macOS
        if: matrix.platform == 'macos'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          APP="${{ env.APP_NAME }}"
          RID="${{ matrix.rid }}"
          PKG="packages/$RID"
          mkdir -p "$PKG"

          # Strip all debug sections from every executable in a directory
          strip_dir() {
            find "$1" -maxdepth 3 -type f -perm /111 | while read -r b; do
              strip "$b" 2>/dev/null || true
            done
          }

          make_dmg() {
            local TYPE="$1"   # scd | fdd
            local SRC="$2"
            [ ! -d "$SRC" ] && echo "[$TYPE] $SRC not found — skip" && return

            strip_dir "$SRC"

            local TMP_UDRW OUT
            TMP_UDRW=$(mktemp).dmg
            OUT="$PKG/${APP}-${TAG}-${RID}-${TYPE}.dmg"

            # Stage as read-write image, then convert to compressed read-only
            hdiutil create \
              -volname "${APP}" \
              -srcfolder "$SRC" \
              -ov -format UDRW \
              "$TMP_UDRW" >/dev/null

            hdiutil convert "$TMP_UDRW" \
              -format UDZO \
              -imagekey zlib-level=9 \
              -o "$OUT" >/dev/null

            rm -f "$TMP_UDRW"
            echo "[$TYPE] DMG → $OUT  ($(du -sh "$OUT" | cut -f1))"
          }

          make_dmg "scd" "out/scd/$RID"
          make_dmg "fdd" "out/fdd/$RID"

      # ════════════════════════════════════════════════════════════════════════
      #  LINUX PACKAGING
      #  Per mode (SCD + FDD) → naked binary  +  .deb  +  .rpm
      # ════════════════════════════════════════════════════════════════════════
      - name: Linux · Install packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            upx-ucl \
            binutils \
            ruby ruby-dev \
            build-essential \
            rpm dpkg-dev fakeroot \
            patchelf
          # fpm: universal packager (deb, rpm, …)
          sudo gem install --no-document fpm

      - name: Package · Linux
        if: matrix.platform == 'linux'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          APP="${{ env.APP_NAME }}"
          RID="${{ matrix.rid }}"
          PKG="packages/$RID"
          mkdir -p "$PKG"

          # RPM forbids leading 'v' and hyphens in version numbers
          RPM_VER=$(echo "${TAG#v}" | tr '-' '.')

          # Architecture strings per tool
          case "$RID" in
            linux-x64)    DEB_ARCH=amd64   ; RPM_ARCH=x86_64   ;;
            linux-arm64)  DEB_ARCH=arm64   ; RPM_ARCH=aarch64  ;;
            linux-arm)    DEB_ARCH=armhf   ; RPM_ARCH=armv7hl  ;;
            *)            DEB_ARCH=amd64   ; RPM_ARCH=x86_64   ;;
          esac

          package_linux() {
            local TYPE="$1"   # scd | fdd
            local SRC="$2"

            # Locate the main native executable (apphost or single-file binary)
            local BIN
            BIN=$(find "$SRC" -maxdepth 1 -type f -executable | head -n1 || true)
            if [ -z "$BIN" ]; then
              echo "[$TYPE] No executable found in $SRC — skipping"
              return
            fi

            # ── 1. Naked binary ──────────────────────────────────────────────
            local NAKED="$PKG/${APP}-${TAG}-${RID}-${TYPE}"
            cp "$BIN" "$NAKED"
            chmod +x "$NAKED"

            # Strip all debug info (can save 30–50 % on uncompressed binaries)
            strip --strip-all "$NAKED" 2>/dev/null || true

            # UPX LZMA compression (try best quality; gracefully degrade for ARM)
            upx --best --lzma "$NAKED" 2>/dev/null \
              || upx --best "$NAKED" 2>/dev/null \
              || echo "[$TYPE] upx skipped for $NAKED (unsupported arch or format)"

            echo "[$TYPE] naked → $NAKED  ($(du -sh "$NAKED" | cut -f1))"

            # ── 2. .deb + .rpm ───────────────────────────────────────────────
            local PKG_ROOT="$PKG/pkgroot-${TYPE}"
            mkdir -p "$PKG_ROOT/usr/local/bin"
            # Use stripped + compressed binary in the packages too
            cp "$NAKED" "$PKG_ROOT/usr/local/bin/$APP"

            # .deb
            fpm \
              -s dir -t deb \
              -n "$APP" \
              -v "${TAG#v}" \
              --architecture "$DEB_ARCH" \
              --description "Github Trend — ${TYPE} build" \
              --prefix / \
              -C "$PKG_ROOT" \
              -p "$PKG/${APP}-${TAG}-${RID}-${TYPE}.deb" \
              usr/local/bin/$APP \
            || echo "[$TYPE] fpm deb skipped"

            # .rpm
            fpm \
              -s dir -t rpm \
              -n "$APP" \
              -v "$RPM_VER" \
              --architecture "$RPM_ARCH" \
              --description "Github Trend — ${TYPE} build" \
              --prefix / \
              -C "$PKG_ROOT" \
              -p "$PKG/${APP}-${TAG}-${RID}-${TYPE}.rpm" \
              usr/local/bin/$APP \
            || echo "[$TYPE] fpm rpm skipped"

            rm -rf "$PKG_ROOT"
            echo "[$TYPE] packaging done"
          }

          package_linux "scd" "out/scd/$RID"
          package_linux "fdd" "out/fdd/$RID"

      # ── List produced files ────────────────────────────────────────────────
      - name: List packages/${{ matrix.rid }}
        shell: bash
        run: |
          echo "=== packages/${{ matrix.rid }} ==="
          find "packages/${{ matrix.rid }}" -maxdepth 1 -type f \
            -exec ls -lh {} \; 2>/dev/null || echo "(empty)"

      # ── Upload to artifact store ───────────────────────────────────────────
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.rid }}
          path: packages/${{ matrix.rid }}/
          if-no-files-found: warn

  # ═════════════════════════════════════════════════════════════════════════════
  #  JOB: release  — downloads all per-RID artifacts and creates the GH release
  # ═════════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always()   # run even if some build jobs failed

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::tag_name is required when running the workflow manually"
            exit 1
          fi

          NAME="${{ inputs.release_name }}"
          [ -z "$NAME" ] && NAME="$TAG"

          DRAFT="${{ inputs.draft || 'false' }}"

          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "Release: $NAME  (tag=$TAG  draft=$DRAFT)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: ./assets
          merge-multiple: true

      - name: List release assets
        run: find assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            assets/**/*.exe
            assets/**/*.dmg
            assets/**/*.deb
            assets/**/*.rpm
            assets/**/github-trend-*

      - name: Release summary
        if: always()
        run: |
          echo "tag  : ${{ steps.meta.outputs.tag }}"
          echo "name : ${{ steps.meta.outputs.name }}"
          echo "draft: ${{ steps.meta.outputs.draft }}"
